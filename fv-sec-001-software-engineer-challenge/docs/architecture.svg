<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <title>Ad Performance Aggregator — Implementation Plan</title>
  <desc>Architecture and plan diagram for the FV-SEC001 coding challenge</desc>

  <!-- Background -->
  <rect width="780" height="620" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">FV-SEC001 — Ad Performance Aggregator Plan</text>

  <!-- ROW 1: Input -->
  <rect x="20" y="55" width="740" height="60" rx="6" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
  <text x="390" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#495057">INPUT</text>
  <text x="390" y="95" text-anchor="middle" font-size="12" fill="#1a1a2e">ad_data.csv  (~1 GB)  —  campaign_id | date | impressions | clicks | spend | conversions</text>

  <!-- ROW 2: CLI Entry -->
  <rect x="270" y="135" width="240" height="50" rx="6" fill="#4361ee" />
  <text x="390" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="white">aggregator.py (CLI)</text>
  <text x="390" y="174" text-anchor="middle" font-size="11" fill="#c8d3ff">--input  --output  --format</text>

  <!-- Arrow down -->
  <line x1="390" y1="185" x2="390" y2="210" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 3: Three modules -->
  <!-- Reader -->
  <rect x="20" y="210" width="220" height="80" rx="6" fill="white" stroke="#4361ee" stroke-width="1.5"/>
  <text x="130" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#4361ee">reader.py</text>
  <text x="130" y="252" text-anchor="middle" font-size="11" fill="#333">polars.scan_csv()</text>
  <text x="130" y="267" text-anchor="middle" font-size="11" fill="#333">Lazy frame — no full load</text>
  <text x="130" y="282" text-anchor="middle" font-size="11" fill="#333">Row-level error handling</text>

  <!-- Aggregator -->
  <rect x="280" y="210" width="220" height="80" rx="6" fill="white" stroke="#4361ee" stroke-width="1.5"/>
  <text x="390" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#4361ee">aggregator.py</text>
  <text x="390" y="252" text-anchor="middle" font-size="11" fill="#333">group_by(campaign_id)</text>
  <text x="390" y="267" text-anchor="middle" font-size="11" fill="#333">.agg(sum impressions, clicks,</text>
  <text x="390" y="282" text-anchor="middle" font-size="11" fill="#333">spend, conversions)</text>

  <!-- Writer -->
  <rect x="540" y="210" width="220" height="80" rx="6" fill="white" stroke="#4361ee" stroke-width="1.5"/>
  <text x="650" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#4361ee">writer.py</text>
  <text x="650" y="252" text-anchor="middle" font-size="11" fill="#333">Write top10_ctr.csv</text>
  <text x="650" y="267" text-anchor="middle" font-size="11" fill="#333">Write top10_cpa.csv</text>
  <text x="650" y="282" text-anchor="middle" font-size="11" fill="#333">mkdir -p output dir</text>

  <!-- Connecting arrows from CLI -->
  <line x1="330" y1="155" x2="130" y2="210" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="390" y1="185" x2="390" y2="210" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="155" x2="650" y2="210" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow from aggregator down -->
  <line x1="390" y1="290" x2="390" y2="315" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 4: Metrics -->
  <rect x="190" y="315" width="400" height="80" rx="6" fill="white" stroke="#3a0ca3" stroke-width="1.5"/>
  <text x="390" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a0ca3">metrics.py</text>
  <text x="390" y="357" text-anchor="middle" font-size="11" fill="#333">CTR = total_clicks / total_impressions</text>
  <text x="390" y="372" text-anchor="middle" font-size="11" fill="#333">CPA = total_spend / total_conversions  (null if conversions = 0)</text>
  <text x="390" y="387" text-anchor="middle" font-size="11" fill="#333">Top-10 CTR (desc)  ·  Top-10 CPA (asc, exclude 0-conv)</text>

  <!-- Arrow down to outputs -->
  <line x1="390" y1="395" x2="390" y2="420" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 5: Outputs -->
  <rect x="70" y="420" width="260" height="50" rx="6" fill="#06d6a0" />
  <text x="200" y="442" text-anchor="middle" font-size="12" font-weight="bold" fill="white">results/top10_ctr.csv</text>
  <text x="200" y="459" text-anchor="middle" font-size="11" fill="white">sorted by CTR desc</text>

  <rect x="450" y="420" width="260" height="50" rx="6" fill="#06d6a0" />
  <text x="580" y="442" text-anchor="middle" font-size="12" font-weight="bold" fill="white">results/top10_cpa.csv</text>
  <text x="580" y="459" text-anchor="middle" font-size="11" fill="white">sorted by CPA asc, no 0-conv</text>

  <!-- Fan arrows -->
  <line x1="340" y1="395" x2="200" y2="420" stroke="#6c757d" stroke-width="1"/>
  <line x1="440" y1="395" x2="580" y2="420" stroke="#6c757d" stroke-width="1"/>

  <!-- ROW 6: Cross-cutting -->
  <rect x="20" y="495" width="360" height="105" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="200" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Tests (pytest)</text>
  <text x="200" y="532" text-anchor="middle" font-size="11" fill="#555">· Correct aggregation (known fixture CSV)</text>
  <text x="200" y="547" text-anchor="middle" font-size="11" fill="#555">· CTR / CPA formula correctness</text>
  <text x="200" y="562" text-anchor="middle" font-size="11" fill="#555">· Zero-conversion exclusion in CPA list</text>
  <text x="200" y="577" text-anchor="middle" font-size="11" fill="#555">· Malformed row skipping / error log</text>
  <text x="200" y="592" text-anchor="middle" font-size="11" fill="#555">· Missing input file → clear error message</text>

  <rect x="400" y="495" width="360" height="105" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="580" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Deliverables</text>
  <text x="580" y="532" text-anchor="middle" font-size="11" fill="#555">· aggregator.py + src/ package</text>
  <text x="580" y="547" text-anchor="middle" font-size="11" fill="#555">· requirements.txt  (polars, pytest)</text>
  <text x="580" y="562" text-anchor="middle" font-size="11" fill="#555">· Dockerfile</text>
  <text x="580" y="577" text-anchor="middle" font-size="11" fill="#555">· README.md  (setup, run, perf numbers)</text>
  <text x="580" y="592" text-anchor="middle" font-size="11" fill="#555">· PROMPTS.md</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c757d"/>
    </marker>
  </defs>
</svg>
